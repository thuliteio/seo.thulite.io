[build.environment]
  DART_SASS_VERSION = "1.97.3"
  GO_VERSION = "1.26.0"
  HUGO_VERSION = "0.162.0"
  NODE_VERSION = "24.16.0"
  NPM_VERSION = "11.13.0"
  TZ = "Europe/Amsterdam"

[build]
  publish = "public"
  command = """\
  git config core.quotepath false && \
  npm install && \
  hugo build --gc --minify --baseURL "${URL}"
  """

[context.deploy-preview]
  command = """\
  git config core.quotepath false && \
  npm install && \
  hugo build --gc --minify --baseURL "$DEPLOY_PRIME_URL"
  """

[context.branch-deploy]
  command = """\
  git config core.quotepath false && \
  npm install && \
  hugo build --gc --minify --baseURL "$DEPLOY_PRIME_URL"
  """

[dev]
  framework = "#custom"
  command = "npm run dev"
  targetPort = 1313
  port = 8888
  publish = "public"
  autoLaunch = false

# Redirects and rewrites — https://docs.netlify.com/routing/redirects/#syntax-for-the-netlify-configuration-file
[[redirects]]
  from = "https://seo.thulite.io/docs/*"
  to = "https://docs.thulite.io/seo/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://seo.thulite.io/*"
  to = "https://docs.thulite.io/seo/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://seo.gethyas.com/*"
  to = "https://seo.thulite.io/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/docs/built-ins/*"
  to = "/docs/signals/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/docs/utilities/*"
  to = "/docs/signals/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/docs/start-here/manual-setup/"
  to = "/docs/start-here/installation/"
  status = 301
  force = true

[[redirects]]
  from = "/docs/start-here/customizing-seo/"
  to = "/docs/start-here/configuration/"
  status = 301
  force = true

[[redirects]]
  from = "/docs/reference/sitemap/"
  to = "/docs/reference/settings/"
  status = 301
  force = true

[[redirects]]
  from = "/*"
  to = "/404/"
  status = 404

# Custom headers — https://docs.netlify.com/routing/headers/#syntax-for-the-netlify-configuration-file
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Content-Security-Policy = "default-src 'self'; manifest-src 'self'; connect-src 'self' https://plausible.io; font-src 'self'; img-src 'self' https://avatars.githubusercontent.com data:; script-src 'self' https://plausible.io 'nonce-dXNlcj0iaGVsbG8iLGRvbWFpbj0iaGVua3ZlcmxpbmRlLmNvbSIsZG9jdW1lbnQud3JpdGUodXNlcisiQCIrZG9tYWluKTs=' 'sha256-aWZ3y/RxbBYKHXH0z8+8ljrHG1mSBvyzSfxSMjBSaXk=' 'sha256-d2naYp9C7LmEhG5Ym6TxSt+GauEaZC4Z+I9rATlQz1E='; style-src 'self'"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin"
    Permissions-Policy = "geolocation=(self), microphone=(), camera=()"
    Cache-Control= '''
    public,
    max-age=31536000'''
    Access-Control-Allow-Origin = "*"
